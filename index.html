<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Документ</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #2f333d;
    }

    .viewer {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #2f333d;
    }

    .fallback {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .fallback a {
      color: #ffffff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <iframe class="viewer" src="document.pdf#view=FitH" title="Документ"></iframe>

  <noscript>
    <div class="fallback">
      <p>
        Откройте документ:
        <a href="document.pdf">document.pdf</a>
      </p>
    </div>
  </noscript>
</body>
</html>
